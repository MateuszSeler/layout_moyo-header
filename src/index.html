<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700&display=swap"
    />
    <title>Moyo header</title>
    <link
      rel="stylesheet"
      href="./style.css"
    />
  </head>
  <body>
    <header class="header">
      <a href="#LOGO">
        <div class="logo">
          <img
            src="./images/logo.png"
            alt="logo"
          />
        </div>
      </a>
      <nav class="nav">
        <a
          href="#APPLE"
          class="nav__link is-active"
        >
          APPLE
        </a>
        <a
          href="#SAMSUNG"
          class="nav__link"
        >
          SAMSUNG
        </a>
        <a
          href="#SMARTPHONES"
          class="nav__link"
        >
          SMARTPHONES
        </a>
        <a
          href="#COMPUTERS"
          class="nav__link"
          data-qa="hover"
        >
          LAPTOPS & COMPUTERS
        </a>
        <a
          href="#GADGETS"
          class="nav__link"
        >
          GADGETS
        </a>
        <a
          href="#TABLETS"
          class="nav__link"
        >
          TABLETS
        </a>
        <a
          href="#PHOTO"
          class="nav__link"
        >
          PHOTO
        </a>
        <a
          href="#VIDEO"
          class="nav__link"
        >
          VIDEO
        </a>
      </nav>
    </header>

    <main class="main"></main>

    <footer class="footer"></footer>
  </body>
</html>
